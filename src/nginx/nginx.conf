# Rate-limit zone for the API surface (POST /api/beta, /api/developer, and any future /api/*
# route) — 5 requests/min per IP with a small burst, sized for signup-form traffic, not real
# users hammering the API. Declared here (outside any server{} block) rather than in nginx.conf's
# own http{} block because this file is included *inside* that block by the official nginx image
# (see docker-compose.yml's mount to /etc/nginx/conf.d/default.conf) — http-context directives are
# valid anywhere in an included conf.d file. See .step/security.md for the full rationale.
limit_req_zone $binary_remote_addr zone=api_signup:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name api.openinvoicexml.de;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.openinvoicexml.de;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/api.openinvoicexml.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.openinvoicexml.de/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Not preloaded on purpose — see .step/security.md ("HSTS" section) for why.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    client_max_body_size 256k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    limit_conn addr 20;

    location ~ /\. {
        deny all;
    }

    location /api/ {
        limit_req zone=api_signup burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
